<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="30" font-size="14" font-weight="500" fill="#2c2c2a">8 stations (ESP32)</text>
  <text x="40" y="48" font-size="12" fill="#5f5e5a">each counts black + blue tokens · wired Ethernet</text>

  <g>
    <rect x="40" y="60" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="110" y="82" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Station 1</text>
    <text x="110" y="99" font-size="12" fill="#0F6E56" text-anchor="middle">OLED · SD · W5500</text>
  </g>
  <g>
    <rect x="196" y="60" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="266" y="82" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Station 2</text>
    <text x="266" y="99" font-size="12" fill="#0F6E56" text-anchor="middle">OLED · SD · W5500</text>
  </g>
  <g>
    <rect x="352" y="60" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="422" y="82" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">…</text>
    <text x="422" y="99" font-size="12" fill="#0F6E56" text-anchor="middle">Stations 3 – 7</text>
  </g>
  <g>
    <rect x="508" y="60" width="132" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="574" y="82" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Station 8</text>
    <text x="574" y="99" font-size="12" fill="#0F6E56" text-anchor="middle">OLED · SD · W5500</text>
  </g>

  <line x1="110" y1="112" x2="110" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="266" y1="112" x2="266" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="422" y1="112" x2="422" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="574" y1="112" x2="574" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="152" width="600" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="340" y="174" font-size="14" font-weight="500" fill="#2c2c2a" text-anchor="middle">Unmanaged switch</text>
    <text x="340" y="191" font-size="12" fill="#5f5e5a" text-anchor="middle">wired LAN · isolated (static IPs, no DHCP)</text>
  </g>

  <line x1="340" y1="204" x2="340" y2="244" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="150" y="244" width="380" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="268" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">Raspberry Pi hub</text>
    <text x="340" y="287" font-size="12" fill="#534AB7" text-anchor="middle">FastAPI + Uvicorn · POST /update · WS /ws</text>
  </g>

  <line x1="340" y1="308" x2="340" y2="348" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="150" y="348" width="380" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="372" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">TV dashboard (kiosk)</text>
    <text x="340" y="391" font-size="12" fill="#185FA5" text-anchor="middle">live counts over WebSocket</text>
  </g>
</svg>
